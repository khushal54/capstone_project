services:
  # 1. Backend Web Service
  - type: web
    name: blog-app-backend
    runtime: node
    plan: free
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DB_URL
        sync: false
        description: "Your MongoDB Connection URI (e.g., mongodb+srv://...)"
      - key: SECRET_KEY
        generateValue: true
        description: "JWT Secret Key (auto-generated if left empty)"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
        description: "Cloudinary Cloud Name"
      - key: CLOUDINARY_API_KEY
        sync: false
        description: "Cloudinary API Key"
      - key: CLOUDINARY_API_SECRET
        sync: false
        description: "Cloudinary API Secret"
      - key: FRONTEND_URL
        fromService:
          name: blog-app-frontend
          type: static
          property: host

  # 2. Frontend Static Site
  - type: static
    name: blog-app-frontend
    runtime: static
    plan: free
    rootDir: Frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      # Rewrite all routes to index.html for Single Page App client-side routing (React Router)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: blog-app-backend
          type: web
          property: host
