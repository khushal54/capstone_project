services:
  # Unified Web Service (Backend serving Frontend static assets)
  - type: web
    name: blog-app
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DB_URL
        sync: false
        description: "Your MongoDB Connection URI (e.g., mongodb+srv://...)"
      - key: SECRET_KEY
        generateValue: true
        description: "JWT Secret Key (auto-generated if left empty)"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
        description: "Cloudinary Cloud Name"
      - key: CLOUDINARY_API_KEY
        sync: false
        description: "Cloudinary API Key"
      - key: CLOUDINARY_API_SECRET
        sync: false
        description: "Cloudinary API Secret"
